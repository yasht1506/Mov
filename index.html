<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MOV CONTROL AND INSTRUMENTS</title>
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- React and ReactDOM -->
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    
    <!-- Babel for JSX -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;700;800&display=swap');

        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background-color: #ffffff;
            color: #0f172a;
            overflow-x: hidden;
        }

        /* --- HARDWARE ACCELERATED ANIMATIONS --- */
        @keyframes rotate-gear {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }
        @keyframes rotate-gear-reverse {
            from { transform: rotate(360deg); }
            to { transform: rotate(0deg); }
        }
        .animate-gear {
            animation: rotate-gear 25s linear infinite;
            will-change: transform;
        }
        .animate-gear-slow {
            animation: rotate-gear 40s linear infinite;
            will-change: transform;
        }
        .animate-gear-reverse {
            animation: rotate-gear-reverse 35s linear infinite;
            will-change: transform;
        }

        @keyframes marquee {
          0% { transform: translate3d(0, 0, 0); }
          100% { transform: translate3d(-50%, 0, 0); }
        }
        .animate-marquee {
          animation: marquee 40s linear infinite;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translate3d(0, 20px, 0); }
            to { opacity: 1; transform: translate3d(0, 0, 0); }
        }
        .reveal {
            opacity: 0;
            will-change: transform, opacity;
        }
        .reveal.active {
            animation: fadeIn 0.8s cubic-bezier(0.22, 1, 0.36, 1) forwards;
        }

        /* --- PREMIUM COLOR ANIMATION (Strictly visible on white/dark backgrounds) --- */
        .premium-text-animate {
            background: linear-gradient(90deg, #cc0000, #ff4d4d, #0044cc, #3399ff, #cc0000);
            background-size: 300% auto;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            animation: text-shine 8s linear infinite;
        }
        @keyframes text-shine {
            to { background-position: 300% center; }
        }

        .glass-header {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border-bottom: 1px solid rgba(0, 0, 0, 0.1);
        }

        .btn-shine {
            position: relative;
            overflow: hidden;
        }
        .btn-shine::after {
            content: '';
            position: absolute;
            top: -50%;
            left: -60%;
            width: 20%;
            height: 200%;
            background: rgba(255, 255, 255, 0.4);
            transform: rotate(30deg);
            transition: all 0.5s;
        }
        .btn-shine:hover::after {
            left: 120%;
        }

        @keyframes wa-pulse {
            0% { box-shadow: 0 0 0 0 rgba(37, 211, 102, 0.7); }
            70% { box-shadow: 0 0 0 15px rgba(37, 211, 102, 0); }
            100% { box-shadow: 0 0 0 0 rgba(37, 211, 102, 0); }
        }
        .wa-btn {
            animation: wa-pulse 2s infinite;
        }

        .image-card {
            transition: transform 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        .image-card:hover {
            transform: scale(1.03);
        }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        // --- THE ORIGINAL REALISTIC GEAR COMPONENT (Darkened for Brass look) ---
        const GearIcon = ({ size, id, className = "" }) => {
            const teeth = Array.from({ length: 20 });
            return (
                <svg width={size} height={size} viewBox="0 0 200 200" fill="none" className={`overflow-visible drop-shadow-2xl ${className}`}>
                    <defs>
                        {/* Dark Brass Gradients */}
                        <linearGradient id={`brass-light-${id}`} x1="0%" y1="0%" x2="100%" y2="100%">
                            <stop offset="0%" stopColor="#8c6900" />
                            <stop offset="25%" stopColor="#735600" />
                            <stop offset="50%" stopColor="#a67c00" />
                            <stop offset="75%" stopColor="#403000" />
                            <stop offset="100%" stopColor="#594300" />
                        </linearGradient>
                        <linearGradient id={`brass-dark-${id}`} x1="100%" y1="100%" x2="0%" y2="0%">
                            <stop offset="0%" stopColor="#594300" />
                            <stop offset="30%" stopColor="#261d00" />
                            <stop offset="70%" stopColor="#403000" />
                            <stop offset="100%" stopColor="#1a1300" />
                        </linearGradient>
                        <filter id={`3d-bevel-${id}`} x="-20%" y="-20%" width="140%" height="140%">
                            <feGaussianBlur in="SourceAlpha" stdDeviation="2" result="blur" />
                            <feSpecularLighting in="blur" surfaceScale="3" specularConstant="1.5" specularExponent="40" lightingColor="#ffd700" result="specOut">
                                <fePointLight x="-50" y="-100" z="200" />
                            </feSpecularLighting>
                            <feComposite in="specOut" in2="SourceAlpha" operator="in" result="specOut" />
                            <feComposite in="SourceGraphic" in2="specOut" operator="arithmetic" k1="0" k2="1" k3="1" k4="0" />
                        </filter>
                        <mask id={`gear-mask-${id}`}>
                            <circle cx="100" cy="100" r="100" fill="white" />
                            <circle cx="100" cy="100" r="25" fill="black" />
                            <circle cx="100" cy="45" r="20" fill="black" />
                            <circle cx="100" cy="155" r="20" fill="black" />
                            <circle cx="147.6" cy="72.5" r="20" fill="black" />
                            <circle cx="52.4" cy="127.5" r="20" fill="black" />
                            <circle cx="147.6" cy="127.5" r="20" fill="black" />
                            <circle cx="52.4" cy="72.5" r="20" fill="black" />
                        </mask>
                    </defs>
                    <g filter={`url(#3d-bevel-${id})`}>
                        {teeth.map((_, i) => (
                            <path
                                key={`tooth-${i}`}
                                d="M 92 4 L 108 4 L 112 18 L 88 18 Z"
                                fill={`url(#brass-dark-${id})`}
                                transform={`rotate(${i * 18} 100 100)`}
                            />
                        ))}
                        <circle cx="100" cy="100" r="88" fill={`url(#brass-light-${id})`} mask={`url(#gear-mask-${id})`} />
                        <circle cx="100" cy="100" r="88" fill="none" stroke={`url(#brass-dark-${id})`} strokeWidth="2" mask={`url(#gear-mask-${id})`}/>
                        <circle cx="100" cy="100" r="25" fill="none" stroke={`url(#brass-dark-${id})`} strokeWidth="4" />
                        {[45, 155, 72.5, 127.5].map((pos, idx) => (
                            <React.Fragment key={idx}>
                                <circle cx="100" cy={pos} r="20" fill="none" stroke={`url(#brass-dark-${id})`} strokeWidth="3" />
                                <circle cx={pos} cy="100" r="20" fill="none" stroke={`url(#brass-dark-${id})`} strokeWidth="3" />
                            </React.Fragment>
                        ))}
                        <circle cx="100" cy="100" r="32" fill="none" stroke={`url(#brass-light-${id})`} strokeWidth="4" />
                    </g>
                </svg>
            );
        };

        const Icon = ({ name, size = 24, className = "" }) => {
            const getIconPath = () => {
                switch(name) {
                    case 'menu': return <path d="M4 12h16M4 6h16M4 18h16" />;
                    case 'x': return <path d="M18 6 6 18M6 6l12 12" />;
                    case 'phone': return <path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07 19.5 19.5 0 0 1-6-6 19.79 19.79 0 0 1-3.07-8.67A2 2 0 0 1 4.11 2h3a2 2 0 0 1 2 1.72 12.84 12.84 0 0 0 .7 2.81 2 2 0 0 1-.45 2.11L8.09 9.91a16 16 0 0 0 6 6l1.27-1.27a2 2 0 0 1 2.11-.45 12.84 12.84 0 0 0 2.81.7A2 2 0 0 1 22 16.92z"/>;
                    case 'mail': return <React.Fragment><rect width="20" height="16" x="2" y="4" rx="2"/><path d="m22 7-8.97 5.7a1.94 1.94 0 0 1-2.06 0L2 7"/></React.Fragment>;
                    case 'map': return <React.Fragment><path d="M20 10c0 6-8 12-8 12s-8-6-8-12a8 8 0 0 1 16 0Z"/><circle cx="12" cy="10" r="3"/></React.Fragment>;
                    case 'settings': return <React.Fragment><path d="M12.22 2h-.44a2 2 0 0 0-2 2v.18a2 2 0 0 1-1 1.73l-.43.25a2 2 0 0 1-2 0l-.15-.08a2 2 0 0 0-2.73.73l-.22.38a2 2 0 0 0 .73 2.73l.15.1a2 2 0 0 1 1 1.72v.51a2 2 0 0 1-1 1.74l-.15.09a2 2 0 0 0-.73 2.73l.22.38a2 2 0 0 0 2.73.73l.15-.08a2 2 0 0 1 2 0l.43.25a2 2 0 0 1 1 1.73V20a2 2 0 0 0 2 2h.44a2 2 0 0 0 2-2v-.18a2 2 0 0 1 1-1.73l.43-.25a2 2 0 0 1 2 0l.15.08a2 2 0 0 0 2.73-.73l.22-.39a2 2 0 0 0-.73-2.73l-.15-.09a2 2 0 0 1-1-1.74v-.47a2 2 0 0 1 1-1.74l.15-.09a2 2 0 0 0 .73-2.73l-.22-.39a2 2 0 0 0-2.73-.73l-.15.08a2 2 0 0 1-2 0l-.43-.25a2 2 0 0 1-1-1.73V4a2 2 0 0 0-2-2z"/><circle cx="12" cy="12" r="3"/></React.Fragment>;
                    case 'cpu': return <React.Fragment><rect x="4" y="4" width="16" height="16" rx="2"/><rect x="9" y="9" width="6" height="6"/><path d="M15 2v2M15 20v2M2 15h2M2 9h2M20 15h2M20 9h2M9 2v2M9 20v2"/></React.Fragment>;
                    case 'gauge': return <React.Fragment><path d="m12 14 4-4"/><path d="M3.34 19a10 10 0 1 1 17.32 0"/></React.Fragment>;
                    case 'wrench': return <path d="M14.7 6.3a1 1 0 0 0 0 1.4l1.6 1.6a1 1 0 0 0 1.4 0l3.77-3.77a6 6 0 0 1-7.94 7.94l-6.91 6.91a2.12 2.12 0 0 1-3-3l6.91-6.91a6 6 0 0 1 7.94-7.94l-3.76 3.76z"/>;
                    case 'refresh': return <React.Fragment><path d="M3 12a9 9 0 0 1 9-9 9.75 9.75 0 0 1 6.74 2.74L21 8"/><path d="M21 3v5h-5"/><path d="M21 12a9 9 0 0 1-9 9 9.75 9.75 0 0 1-6.74-2.74L3 16"/><path d="M8 16H3v5"/></React.Fragment>;
                    case 'arrow': return <path d="M5 12h14M12 5l7 7-7 7" />;
                    case 'check': return <React.Fragment><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/><polyline points="22 4 12 14.01 9 11.01"/></React.Fragment>;
                    default: return null;
                }
            };
            return (
                <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}>
                    {getIconPath()}
                </svg>
            );
        };

        // --- ORIGINAL DATA ---
        const servicesData = [
            { id: 1, title: "Overhauling of Actuators", icon: "settings", description: "Complete overhauling and service for all types of actuators (Auma, Rotork, Limitorque,Chinese MOV, Integral and Non- Integral Starter, etc)." },
            { id: 2, title: "AMC for C&I System Maintenance", icon: "cpu", description: "Comprehensive Control and Instrumentation services including erection, commissioning, and maintenance." },
            { id: 3, title: "Control Valve Calibration", icon: "gauge", description: "Precision calibration and testing of control valves to ensure optimal process flow." },
            { id: 4, title: "Retrofitting & commissioning of Actuators", icon: "refresh", description: "Upgrading old manual valves or obsolete actuators with modern electric or pneumatic systems." },
            { id: 5, title: "Supply of Spares", icon: "settings", description: "Supply of genuine spares for actuators, control valves, and instrumentation equipment." },
            { id: 6, title: "Instrument Calibration", icon: "wrench", description: "Systematic comparison of instrument performance against certified standards to ensure precise accuracy and regulatory compliance" }
        ];

        const clients = [
            { name: "Vedanta", logo: "Vedanta_logo.png" }, { name: "BALCO", logo: "BALCO_LOGO.jpg" }, { name: "Adani Power", logo: "Adanipower_logo.png" },
            { name: "NTPC", logo: "NTPC_Logo.png" }, { name: "CSPDCL", logo: "CSPDCL.png" }, { name: "LANCO", logo: "Lanco.png" },
            { name: "Aditya Birla", logo: "Aditya Birla.png" }, { name: "Reliance", logo: "Reliance_Power.svg.png" }, { name: "Jindal", logo: "jindal.png" },
            { name: "Rattanindia", logo: "rattanindia.png" }, { name: "NGSL", logo: "ngsl.png" }
        ];

        const recentSites = [
            { id: 1, title: "Raipur", src: "Aditya Birla.png" }, { id: 2, title: "Balco", src: "Vedanta_logo.png" }, { id: 3, title: "Lucknow", src: "Reliance_Power.svg.png" },
            { id: 4, title: "Korba", src: "Adanipower_logo.png" }, { id: 5, title: "Anuppur", src: "Lanco.png" }, { id: 6, title: "Balco", src: "ngsl.png" }
        ];

        const galleryImages = [
            { id: 1, src: "8.png" }, { id: 2, src: "1.png" }, { id: 3, src: "2.png" }, { id: 4, src: "4.png" },
            { id: 6, src: "6.png" }, { id: 8, src: "3.png" },
            { id: 9, src: "10.jpeg" }, { id: 10, src: "9.jpeg" }, { id: 11, src: "11.jpeg" }, { id: 12, src: "12.jpeg" },
            { id: 13, src: "13.jpeg" }, { id: 15, src: "15.jpeg" }, { id: 16, src: "16.jpeg" },
            { id: 17, src: "17.jpeg" }, { id: 18, src: "18.jpeg" }, { id: 19, src: "19.jpeg" }
        ];

        const Reveal = ({ children, className = "" }) => {
            const ref = useRef(null);
            useEffect(() => {
                const observer = new IntersectionObserver(([entry]) => {
                    if (entry.isIntersecting) entry.target.classList.add('active');
                }, { threshold: 0.1 });
                if (ref.current) observer.observe(ref.current);
                return () => observer.disconnect();
            }, []);
            return <div ref={ref} className={`reveal ${className}`}>{children}</div>;
        };

        // --- THE GEAR COMPONENT (Dark Brass and High Opacity) ---
        const RotatingGear = ({ size, top, left, right, bottom, reverse = false, opacity = "opacity-70", animClass = "animate-gear" }) => (
            <div 
                className={`absolute pointer-events-none ${opacity} ${reverse ? 'animate-gear-reverse' : animClass}`} 
                style={{ width: size, height: size, top, left, right, bottom }}
            >
                <GearIcon size={size} id={`gear-${Math.random()}`} />
            </div>
        );

        const Navbar = ({ activePage, setActivePage }) => {
            const [scrolled, setScrolled] = useState(false);
            const [open, setOpen] = useState(false);

            useEffect(() => {
                const handle = () => setScrolled(window.scrollY > 50);
                window.addEventListener('scroll', handle);
                return () => window.removeEventListener('scroll', handle);
            }, []);

            const navItems = [
                { id: 'home', label: 'Home' },
                { id: 'about', label: 'About Us' },
                { id: 'services', label: 'Our Services' },
                { id: 'gallery', label: 'Gallery' },
                { id: 'contact', label: 'Contact Us' }
            ];

            return (
                <nav className={`fixed w-full z-[100] transition-all duration-500 ${scrolled ? 'glass-header shadow-xl py-2' : 'bg-transparent py-4'}`}>
                    <div className="max-w-[1920px] mx-auto px-6 flex justify-between items-center h-16">
                        <div className="flex items-center gap-3 cursor-pointer group" onClick={() => setActivePage('home')}>
                            <div className="bg-white p-1 rounded-lg shadow-sm group-hover:scale-105 transition-transform">
                                <img src="MOV_LOGO.jpeg" alt="Logo" className="h-10 md:h-12 w-auto object-contain" />
                            </div>
                            <span className="font-black text-sm md:text-lg tracking-tighter premium-text-animate">
                                MOV CONTROL AND INSTRUMENTS
                            </span>
                        </div>

                        <div className="hidden lg:flex items-center gap-8">
                            {navItems.map(item => (
                                <button 
                                    key={item.id}
                                    onClick={() => setActivePage(item.id)}
                                    className={`text-xs font-bold uppercase tracking-widest transition-all hover:text-blue-600 relative group ${activePage === item.id ? 'text-blue-600' : (scrolled ? 'text-slate-900' : 'text-white')}`}
                                >
                                    {item.label}
                                    <span className={`absolute -bottom-1 left-0 h-0.5 bg-blue-600 transition-all duration-300 ${activePage === item.id ? 'w-full' : 'w-0 group-hover:w-full'}`}></span>
                                </button>
                            ))}
                            <button 
                                onClick={() => setActivePage('contact')}
                                className="bg-blue-600 hover:bg-blue-700 text-white px-6 py-2 rounded-full font-bold text-xs tracking-widest transition-all btn-shine shadow-lg"
                            >
                                GET QUOTE
                            </button>
                        </div>

                        <button className={`lg:hidden p-2 rounded-lg ${scrolled ? 'text-slate-900' : 'text-white'}`} onClick={() => setOpen(!open)}>
                            <Icon name={open ? "x" : "menu"} size={28} />
                        </button>
                    </div>

                    <div className={`lg:hidden absolute top-full left-0 w-full bg-white transition-all duration-300 origin-top overflow-hidden ${open ? 'max-h-[500px] opacity-100 shadow-xl border-b' : 'max-h-0 opacity-0'}`}>
                        <div className="flex flex-col p-6 gap-6">
                            {navItems.map(item => (
                                <button 
                                    key={item.id}
                                    onClick={() => { setActivePage(item.id); setOpen(false); }}
                                    className={`text-left text-lg font-bold ${activePage === item.id ? 'text-blue-600' : 'text-slate-600'}`}
                                >
                                    {item.label}
                                </button>
                            ))}
                        </div>
                    </div>
                </nav>
            );
        };

        const Hero = ({ onAction }) => (
            <section className="relative min-h-screen flex items-center justify-center bg-slate-950 overflow-hidden">
                <div className="absolute inset-0">
                    <img src="bg.jpg" className="w-full h-full object-cover opacity-30" alt="Background" />
                    <div className="absolute inset-0 bg-gradient-to-b from-slate-950/80 via-transparent to-slate-950"></div>
                </div>

                {/* NO GEARS IN MAIN HERO SECTION AS REQUESTED */}

                <div className="container max-w-[1400px] mx-auto px-6 relative z-10 text-center">
                    <Reveal>
                        <span className="inline-block px-4 py-1.5 mb-6 rounded-full bg-blue-600/10 border border-blue-600/20 text-blue-400 font-bold text-[10px] tracking-[0.3em] uppercase">
                            Industrial Automation Experts
                        </span>
                        <h1 className="text-5xl md:text-8xl font-black mb-8 leading-tight tracking-tighter">
                            <span className="text-white">MOV CONTROL</span><br/>
                            <span className="premium-text-animate">AND INSTRUMENTS</span>
                        </h1>
                        <p className="max-w-2xl mx-auto text-slate-400 text-base md:text-xl mb-12 leading-relaxed">
                            Empowering industries with precision valve automation, advanced control systems, and reliable instrumentation services.
                        </p>
                        <div className="flex flex-col sm:flex-row gap-5 justify-center">
                            <button 
                                onClick={() => onAction('services')}
                                className="group bg-blue-600 hover:bg-blue-700 text-white px-10 py-5 rounded-xl font-bold text-sm tracking-widest transition-all flex items-center justify-center gap-3 shadow-2xl btn-shine"
                            >
                                EXPLORE SERVICES <Icon name="arrow" className="group-hover:translate-x-2 transition-transform" />
                            </button>
                            <button 
                                onClick={() => onAction('contact')}
                                className="bg-white/5 hover:bg-white/10 backdrop-blur-md border border-white/10 text-white px-10 py-5 rounded-xl font-bold text-sm tracking-widest transition-all"
                            >
                                CONTACT SUPPORT
                            </button>
                        </div>
                    </Reveal>
                </div>
            </section>
        );

        const ClientTicker = () => (
            <div className="bg-white py-12 border-y border-slate-100 overflow-hidden relative">
                <div className="flex items-center animate-marquee whitespace-nowrap">
                    {[...clients, ...clients].map((c, i) => (
                        <div key={i} className="mx-12 flex items-center justify-center">
                            <img src={c.logo} alt={c.name} className="h-8 md:h-12 w-auto object-contain max-w-[150px]" />
                        </div>
                    ))}
                </div>
            </div>
        );

        const Services = () => (
            <section className="py-24 bg-slate-50 relative overflow-hidden">
                <RotatingGear size={400} top="5%" right="-10%" opacity="opacity-70" />
                <RotatingGear size={300} bottom="5%" left="-8%" reverse opacity="opacity-60" />

                <div className="container max-w-[1400px] mx-auto px-6 relative z-10">
                    <div className="text-center mb-20">
                        <Reveal>
                            <h2 className="text-blue-600 font-bold tracking-widest uppercase text-xs mb-4">Our Expertise</h2>
                            <h3 className="text-3xl md:text-6xl font-black text-slate-900 mb-6">Comprehensive Services</h3>
                            <p className="text-slate-500 max-w-2xl mx-auto text-lg">We provide end-to-end solutions for all your industrial valve and control needs, ensuring reliability and efficiency.</p>
                        </Reveal>
                    </div>

                    <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-8">
                        {servicesData.map((s) => (
                            <Reveal key={s.id} className="h-full">
                                <div className="group bg-white p-10 rounded-3xl shadow-sm hover:shadow-2xl border border-slate-100 flex flex-col items-start h-full transition-all duration-500 hover:-translate-y-2">
                                    <div className="w-14 h-14 rounded-2xl bg-blue-50 text-blue-600 flex items-center justify-center mb-8 group-hover:bg-blue-600 group-hover:text-white transition-all">
                                        <Icon name={s.icon} size={28} />
                                    </div>
                                    <h4 className="text-xl font-bold mb-4 text-slate-900 group-hover:text-blue-600 transition-colors">{s.title}</h4>
                                    <p className="text-slate-500 leading-relaxed text-sm">{s.description}</p>
                                </div>
                            </Reveal>
                        ))}
                    </div>
                </div>
            </section>
        );

        const About = () => (
            <section className="py-24 bg-white relative overflow-hidden">
                <RotatingGear size={500} top="-5%" left="-15%" opacity="opacity-50" />
                
                <div className="container max-w-[1400px] mx-auto px-6 relative z-10">
                    <div className="grid lg:grid-cols-2 gap-16 items-center">
                        <Reveal className="relative">
                            <img src="bg.jpg" className="rounded-[40px] shadow-2xl w-full h-[500px] object-cover" alt="About" />
                            <div className="absolute -bottom-6 -right-6 bg-white p-8 rounded-3xl shadow-xl border border-slate-100">
                                <p className="text-4xl font-black text-blue-600 mb-1">100%</p>
                                <p className="text-slate-500 font-bold text-xs uppercase tracking-widest">Quality Assurance</p>
                            </div>
                        </Reveal>
                        <Reveal>
                            <h2 className="text-blue-600 font-bold tracking-widest uppercase text-xs mb-4">About Us</h2>
                            <h3 className="text-3xl md:text-5xl font-black text-slate-900 mb-8">Industrial Service Pioneers</h3>
                            <p className="text-slate-500 text-lg leading-relaxed mb-8">
                                MOV CONTROL AND INSTRUMENTS is a premier service provider specializing in the maintenance, repair, and calibration of industrial instruments.
                            </p>
                            <div className="space-y-6">
                                {[
                                    { t: "Expert Team", d: "Certified engineers with decades of industry experience." },
                                    { t: "Modern Technology", d: "Using latest diagnostic equipment for precise calibration." },
                                    { t: "24/7 Support", d: "Emergency site services available round the clock." }
                                ].map((item, i) => (
                                    <div key={i} className="flex gap-4 items-start">
                                        <div className="w-6 h-6 rounded-full bg-blue-100 text-blue-600 flex items-center justify-center flex-shrink-0 mt-1">
                                            <Icon name="arrow" size={14} />
                                        </div>
                                        <div>
                                            <h5 className="font-bold text-slate-900">{item.t}</h5>
                                            <p className="text-slate-500 text-sm">{item.d}</p>
                                        </div>
                                    </div>
                                ))}
                            </div>
                        </Reveal>
                    </div>
                </div>
            </section>
        );

        const RecentWork = () => (
            <section className="py-24 bg-slate-50 relative overflow-hidden">
                <RotatingGear size={400} bottom="-5%" right="-10%" opacity="opacity-60" />

                <div className="container max-w-[1400px] mx-auto px-6 relative z-10">
                    <div className="text-center mb-16">
                        <Reveal>
                            <h2 className="text-blue-600 font-bold tracking-widest uppercase text-xs mb-4">Our Portfolio</h2>
                            <h3 className="text-3xl md:text-6xl font-black text-slate-900 mb-6">Recent Site Work</h3>
                        </Reveal>
                    </div>
                    <div className="grid grid-cols-2 lg:grid-cols-3 gap-6">
                        {recentSites.map(site => (
                            <Reveal key={site.id}>
                                <div className="group relative overflow-hidden rounded-[32px] aspect-[4/3] bg-white border border-slate-200 p-8 flex flex-col items-center justify-center text-center image-card shadow-sm hover:shadow-xl">
                                    <img src={site.src} className="max-h-24 w-auto object-contain mb-6 transition-all duration-500 group-hover:scale-110" alt={site.title} />
                                    <h5 className="font-bold text-slate-800 text-lg">{site.title}</h5>
                                </div>
                            </Reveal>
                        ))}
                    </div>
                </div>
            </section>
        );

        const Gallery = ({ images }) => (
            <section className="py-24 bg-white relative">
                <div className="container max-w-[1400px] mx-auto px-6">
                    <div className="text-center mb-16">
                        <Reveal>
                            <h2 className="text-blue-600 font-bold tracking-widest uppercase text-xs mb-4">Visual Records</h2>
                            <h3 className="text-3xl md:text-6xl font-black text-slate-900 mb-6">Project Gallery</h3>
                        </Reveal>
                    </div>
                    <div className="columns-1 sm:columns-2 lg:columns-4 gap-4 space-y-4">
                        {images.map(img => (
                            <div key={img.id} className="break-inside-avoid relative group rounded-2xl overflow-hidden shadow-sm hover:shadow-xl transition-all duration-500 image-card">
                                <img src={img.src} className="w-full h-auto object-cover" loading="lazy" alt="Gallery Work" />
                                <div className="absolute inset-0 bg-blue-900/40 opacity-0 group-hover:opacity-100 transition-opacity flex items-center justify-center">
                                    <div className="w-10 h-10 bg-white rounded-full flex items-center justify-center text-blue-600 shadow-lg">
                                        <Icon name="arrow" className="-rotate-45" size={18} />
                                    </div>
                                </div>
                            </div>
                        ))}
                    </div>
                </div>
            </section>
        );

        const Contact = () => {
            const [status, setStatus] = useState('idle');
            const handleSubmit = async (e) => {
                e.preventDefault();
                setStatus('submitting');
                const form = e.target;
                const data = new FormData(form);
                try {
                    const response = await fetch("https://formsubmit.co/ajax/mov.krb@gmail.com", { method: "POST", body: data });
                    if (response.ok) { setStatus('success'); form.reset(); }
                    else { setStatus('error'); }
                } catch { setStatus('error'); }
                setTimeout(() => setStatus('idle'), 5000);
            };

            return (
                <section className="py-24 bg-slate-950 relative overflow-hidden">
                    <RotatingGear size={600} bottom="-20%" left="-15%" opacity="opacity-60" />

                    <div className="container max-w-[1400px] mx-auto px-6 relative z-10">
                        <div className="bg-slate-900 rounded-[48px] p-8 md:p-20 border border-white/5 shadow-3xl overflow-hidden">
                            <div className="grid lg:grid-cols-2 gap-20">
                                <div>
                                    <Reveal>
                                        <h3 className="text-4xl md:text-7xl font-black text-white mb-8 tracking-tighter">Get In Touch</h3>
                                        <p className="text-slate-400 text-lg mb-12">Have a query? Reach out to us for immediate assistance.</p>
                                        
                                        <div className="space-y-10">
                                            {[
                                                { icon: "phone", label: "Call Us", val: "+91 72238 38222" },
                                                { icon: "mail", label: "Email Us", val: "mov.krb@gmail.com" },
                                                { icon: "map", label: "Visit Us", val: "Flat no 4A, Sai Enclave, Sanjay Nagar korba (C.G) 495677" }
                                            ].map((item, i) => (
                                                <div key={i} className="flex gap-6 items-center group">
                                                    <div className="w-14 h-14 rounded-2xl bg-white/5 border border-white/10 flex items-center justify-center text-blue-400 group-hover:bg-blue-600 group-hover:text-white transition-all">
                                                        <Icon name={item.icon} size={24} />
                                                    </div>
                                                    <div>
                                                        <p className="text-xs font-bold text-slate-500 uppercase tracking-widest mb-1">{item.label}</p>
                                                        <p className="text-lg text-white font-bold">{item.val}</p>
                                                    </div>
                                                </div>
                                            ))}
                                        </div>
                                    </Reveal>
                                </div>

                                <div className="bg-white rounded-[40px] p-8 md:p-12 shadow-2xl">
                                    {status === 'success' ? (
                                        <div className="h-full flex flex-col items-center justify-center text-center py-20">
                                            <div className="w-20 h-20 bg-emerald-100 text-emerald-600 rounded-full flex items-center justify-center mb-8">
                                                <Icon name="check" size={40} />
                                            </div>
                                            <h4 className="text-3xl font-black text-slate-900 mb-4">Message Sent!</h4>
                                            <p className="text-slate-500">Thank you for your inquiry. We'll be in touch soon.</p>
                                        </div>
                                    ) : (
                                        <form onSubmit={handleSubmit} className="space-y-6">
                                            <input type="hidden" name="_captcha" value="false" />
                                            <div className="grid md:grid-cols-2 gap-6">
                                                <input name="name" required placeholder="Your Name" className="w-full bg-slate-50 border border-slate-100 rounded-2xl px-6 py-4 outline-none focus:ring-2 focus:ring-blue-100 transition-all" />
                                                <input name="phone" placeholder="Phone Number" className="w-full bg-slate-50 border border-slate-100 rounded-2xl px-6 py-4 outline-none focus:ring-2 focus:ring-blue-100 transition-all" />
                                            </div>
                                            <input name="email" required type="email" placeholder="Email Address" className="w-full bg-slate-50 border border-slate-100 rounded-2xl px-6 py-4 outline-none focus:ring-2 focus:ring-blue-100 transition-all" />
                                            <textarea name="message" required rows="4" placeholder="How can we help you?" className="w-full bg-slate-50 border border-slate-100 rounded-2xl px-6 py-4 outline-none focus:ring-2 focus:ring-blue-100 transition-all"></textarea>
                                            <button disabled={status === 'submitting'} className="w-full bg-blue-600 hover:bg-blue-700 text-white py-5 rounded-2xl font-black text-sm tracking-widest shadow-xl shadow-blue-200 transition-all btn-shine">
                                                {status === 'submitting' ? 'SENDING...' : 'SEND INQUIRY'}
                                            </button>
                                        </form>
                                    )}
                                </div>
                            </div>
                        </div>
                    </div>
                </section>
            );
        };

        const Footer = ({ onAction }) => (
            <footer className="bg-slate-950 text-slate-400 py-16 border-t border-white/5 relative z-20">
                <div className="container max-w-[1400px] mx-auto px-6">
                    <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-12 mb-16">
                        <div>
                            <h5 className="text-white font-black text-xl mb-6">MOV CNI</h5>
                            <p className="text-sm leading-relaxed mb-8">Your trusted partner for industrial valve automation, instrumentation, and control system solutions.</p>
                            <div className="flex gap-4">
                                {['FB', 'LN', 'TW', 'IG'].map(s => (
                                    <div key={s} className="w-10 h-10 rounded-full bg-white/5 flex items-center justify-center text-xs font-bold hover:bg-blue-600 text-white transition-all cursor-pointer">{s}</div>
                                ))}
                            </div>
                        </div>
                        <div>
                            <h5 className="text-white font-bold mb-6">Quick Links</h5>
                            <ul className="space-y-4 text-sm">
                                {['home', 'about', 'services', 'gallery', 'contact'].map(id => (
                                    <li key={id} onClick={() => onAction(id)} className="hover:text-white cursor-pointer transition-colors capitalize">{id.replace(/([A-Z])/g, ' $1')}</li>
                                ))}
                            </ul>
                        </div>
                        <div>
                            <h5 className="text-white font-bold mb-6">Our Services</h5>
                            <ul className="space-y-4 text-sm">
                                {servicesData.slice(0, 4).map(s => <li key={s.id} className="hover:text-white transition-colors cursor-default truncate">{s.title}</li>)}
                            </ul>
                        </div>
                        <div>
                            <h5 className="text-white font-bold mb-6">Contact Us</h5>
                            <div className="space-y-4 text-sm">
                                <p className="flex items-start gap-3"><Icon name="map" size={16} className="text-blue-500 mt-1" /> Flat no 4A, Sai Enclave, Sanjay Nagar korba (C.G) 495677</p>
                                <p className="flex items-center gap-3"><Icon name="phone" size={16} className="text-blue-500" /> +91 72238 38222</p>
                                <p className="flex items-center gap-3"><Icon name="mail" size={16} className="text-blue-500" /> mov.krb@gmail.com</p>
                            </div>
                        </div>
                    </div>
                    <div className="pt-8 border-t border-white/5 flex flex-col md:flex-row justify-between items-center text-xs gap-4 text-center md:text-left">
                        <p>&copy; 2026 MOV CNI. All rights reserved.</p>
                        <div className="flex gap-8"><span className="cursor-pointer hover:text-white">Privacy Policy</span><span className="cursor-pointer hover:text-white">Terms of Service</span></div>
                    </div>
                </div>
            </footer>
        );

        const App = () => {
            const [activePage, setActivePage] = useState('home');
            useEffect(() => { window.scrollTo({ top: 0, behavior: 'smooth' }); }, [activePage]);

            return (
                <div className="min-h-screen bg-white">
                    <Navbar activePage={activePage} setActivePage={setActivePage} />
                    <main>
                        {activePage === 'home' && <React.Fragment><Hero onAction={setActivePage} /><ClientTicker /><Services /><About /><RecentWork /><Contact /></React.Fragment>}
                        {activePage === 'services' && <div className="pt-20"><Services /><RecentWork /></div>}
                        {activePage === 'about' && <div className="pt-20"><About /><ClientTicker /></div>}
                        {activePage === 'gallery' && <div className="pt-20"><Gallery images={galleryImages} /></div>}
                        {activePage === 'contact' && <div className="pt-20"><Contact /></div>}
                    </main>
                    <Footer onAction={setActivePage} />
                    <a href="https://wa.me/917223838222" target="_blank" rel="noopener noreferrer" className="fixed bottom-8 right-8 z-[200] bg-[#25D366] text-white p-4 rounded-full shadow-2xl wa-btn flex items-center justify-center hover:scale-110 active:scale-95 transition-all"><svg className="w-8 h-8 fill-current" viewBox="0 0 24 24"><path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347m-5.421 7.403h-.004a9.87 9.87 0 01-5.031-1.378l-.361-.214-3.741.982.998-3.648-.235-.374a9.86 9.86 0 01-1.51-5.26c.001-5.45 4.436-9.884 9.888-9.884 2.64 0 5.122 1.03 6.988 2.898a9.825 9.825 0 012.893 6.994c-.003 5.45-4.437 9.884-9.885 9.884m8.413-18.297A11.815 11.815 0 0012.05 0C5.495 0 .16 5.335.157 11.892c0 2.096.547 4.142 1.588 5.945L.057 24l6.305-1.654a11.882 11.882 0 005.683 1.448h.005c6.554 0 11.89-5.335 11.893-11.893a11.821 11.821 0 00-3.48-8.413Z"/></svg></a>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
