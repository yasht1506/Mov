    <!-- Babel for JSX -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <style>
        @keyframes marquee {
          0% { transform: translateX(0); }
          100% { transform: translateX(-50%); }
        }
        .animate-marquee {
          animation: marquee 40s linear infinite;
        }
        .animate-fade-in {
            animation: fadeIn 0.5s ease-in-out;
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* --- PREMIUM CLASSIC HEADING ANIMATIONS --- */
        @keyframes elegant-reveal {
            0% { opacity: 0; transform: translateY(30px) scale(1.05); letter-spacing: -2px; filter: blur(12px); }
            50% { filter: blur(0px); }
            100% { opacity: 1; transform: translateY(0) scale(1); letter-spacing: normal; filter: blur(0); }
        }

        @keyframes premium-shine {
            0% { background-position: -200% center; }
            100% { background-position: 200% center; }
        }
        
        .premium-text-animate {
            background-size: 200% auto;
            animation: 
                elegant-reveal 1.8s cubic-bezier(0.165, 0.84, 0.44, 1) forwards,
                premium-shine 5s linear infinite;
        }

        /* 3D Styles */
        .transform-style-3d {
            transform-style: preserve-3d;
        }
        /* Button Shine Effect */
        @keyframes shine {
            100% { left: 125%; }
        }
        .btn-shine {
            position: relative;
            overflow: hidden;
        }
        .btn-shine::after {
            content: '';
            position: absolute;
            top: 0;
            left: -75%;
            width: 50%;
            height: 100%;
            background: linear-gradient(to right, rgba(255,255,255,0) 0%, rgba(255,255,255,0.3) 100%);
            transform: skewX(-25deg);
            animation: shine 3s infinite;
        }

        /* Floating Gear Animation */
        @keyframes float-gear {
            0%, 100% { transform: translateY(0) rotate(0deg); }
            50% { transform: translateY(-15px) rotate(2deg); }
        }

        /* Checkmark Animation */
        @keyframes check-pop {
            0% { transform: scale(0); }
            70% { transform: scale(1.2); }
            100% { transform: scale(1); }
        }
        .animate-check {
            animation: check-pop 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards;
        }

        /* --- WHATSAPP BUTTON ANIMATION --- */
        @keyframes wa-pulse {
            0% { box-shadow: 0 0 0 0 rgba(37, 211, 102, 0.8); transform: scale(1); }
            50% { transform: scale(1.05); }
            70% { box-shadow: 0 0 0 25px rgba(37, 211, 102, 0); }
            100% { box-shadow: 0 0 0 0 rgba(37, 211, 102, 0); transform: scale(1); }
        }
        .wa-btn {
            animation: wa-pulse 2.5s infinite;
        }
    </style>
</head>

            { id: 5, title: "Anuppur", src: "Lanco.png" },

            { id: 3, src: "2.png" },
            { id: 4, src: "4.png" },
            { id: 5, src: "5.png" },
            { id: 6, src: "6.png" },
            { id: 7, src: "7.png" },
            { id: 8, src: "3.png" },
            { id: 9, src: "10.jpeg" },
            { id: 10, src: "9.jpeg" },
            { id: 11, src: "11.jpeg" },
            { id: 12, src: "12.jpeg" },
            { id: 13, src: "13.jpeg" },
            { id: 14, src: "14.jpeg" },
            { id: 15, src: "15.jpeg" },
        ];


        // --- HELPER COMPONENTS ---

        // Scroll Reveal Component
        const RevealOnScroll = ({ children, delay = 0 }) => {
            const [isVisible, setIsVisible] = useState(false);
            const ref = useRef(null);

            useEffect(() => {
                const observer = new IntersectionObserver(
                    ([entry]) => {
                        if (entry.isIntersecting) {
                            setIsVisible(true);
                            observer.disconnect();
                        }
                    },
                    { threshold: 0.1 }
                );
                if (ref.current) observer.observe(ref.current);
                return () => observer.disconnect();
            }, []);

            return (
                <div 
                    ref={ref} 
                    className={`transition-all duration-1000 transform ${isVisible ? 'opacity-100 translate-y-0' : 'opacity-0 translate-y-10'}`} 
                    style={{ transitionDelay: `${delay}ms` }}
                >
                    {children}
                </div>
            );
        };

        // --- ULTRA-REALISTIC BRASS GEAR GRAPHIC (Matches uploaded images!) ---
        const GearIcon = ({ size, id }) => {
            // Generating 20 teeth to perfectly match the mechanical look of the photos
            const teeth = Array.from({ length: 20 });
            return (
                <svg width={size} height={size} viewBox="0 0 200 200" fill="none" className="overflow-visible opacity-90 drop-shadow-xl">
                    <defs>
                        {/* High Contrast Dark Golden Brass Gradient based on #d19f00 */}
                        <linearGradient id={`brass-light-${id}`} x1="0%" y1="0%" x2="100%" y2="100%">
                            <stop offset="0%" stopColor="#ffd940" />
                            <stop offset="25%" stopColor="#b38800" />
                            <stop offset="50%" stopColor="#d19f00" />
                            <stop offset="75%" stopColor="#664e00" />
                            <stop offset="100%" stopColor="#997500" />
                        </linearGradient>
                        
                        {/* Darker Brass for Shadows/Depth based on #d19f00 */}
                        <linearGradient id={`brass-dark-${id}`} x1="100%" y1="100%" x2="0%" y2="0%">
                            <stop offset="0%" stopColor="#997500" />
                            <stop offset="30%" stopColor="#4d3a00" />
                            <stop offset="70%" stopColor="#806200" />
                            <stop offset="100%" stopColor="#332700" />
                        </linearGradient>

                        {/* Master Bevel & Lighting Filter for true 3D look */}
                        <filter id={`3d-bevel-${id}`} x="-20%" y="-20%" width="140%" height="140%">
                            <feGaussianBlur in="SourceAlpha" stdDeviation="2" result="blur" />
                            <feSpecularLighting in="blur" surfaceScale="3" specularConstant="1.5" specularExponent="40" lightingColor="#FFFFFF" result="specOut">
                                <fePointLight x="-50" y="-100" z="200" />
                            </feSpecularLighting>
                            <feComposite in="specOut" in2="SourceAlpha" operator="in" result="specOut" />
                            <feComposite in="SourceGraphic" in2="specOut" operator="arithmetic" k1="0" k2="1" k3="1" k4="0" />
                        </filter>

                        {/* Mask to cut out the 6 circular holes from the photo */}
                        <mask id={`gear-mask-${id}`}>
                            <circle cx="100" cy="100" r="100" fill="white" />
                            <circle cx="100" cy="100" r="25" fill="black" />
                            <circle cx="100" cy="45" r="20" fill="black" />
                            <circle cx="100" cy="155" r="20" fill="black" />
                            <circle cx="147.6" cy="72.5" r="20" fill="black" />
                            <circle cx="52.4" cy="127.5" r="20" fill="black" />
                            <circle cx="147.6" cy="127.5" r="20" fill="black" />
                            <circle cx="52.4" cy="72.5" r="20" fill="black" />
                        </mask>
                    </defs>

                    <g filter={`url(#3d-bevel-${id})`}>
                        {/* Render Teeth Outer Edge */}

                            <path
                                key={`tooth-${i}`}
                                d="M 92 4 L 108 4 L 112 18 L 88 18 Z"

                        {/* Main Thick Body */}

                    </g>

        };

        // 3D Rotating Gear Component - Set behind content using zIndex
        const RotatingGear = ({ direction = 1, speed = 0.2, top, left, right, bottom, size = 200, opacity = 1, id="g1" }) => {
            const [rotation, setRotation] = useState(0);
            
            useEffect(() => {
                const handleScroll = () => {
                    setRotation(window.scrollY * speed * direction);
                };
                window.addEventListener('scroll', handleScroll);
                return () => window.removeEventListener('scroll', handleScroll);
            }, []);

            return (
                <div 
                    className="absolute pointer-events-none"
                    style={{ 
                        top, left, right, bottom, 
                        width: size,
                        height: size,
                        opacity: opacity,
                        zIndex: 0 /* Ensures gears stay strictly in the background */
                    }}
                >
                    <div style={{
                        transform: `rotate(${rotation}deg)`,
                        transformOrigin: 'center center',
                        transition: 'transform 0.05s linear',
                        width: '100%',
                        height: '100%'
                    }}>
                        <GearIcon size={size} id={id} />
                    </div>
                </div>
            );
        };

        // 3D Tilt Card Component
        const TiltCard = ({ children }) => {
            const [transform, setTransform] = useState("perspective(1000px) rotateX(0deg) rotateY(0deg) scale(1)");
            
            const handleMouseMove = (e) => {
                const card = e.currentTarget;
                const box = card.getBoundingClientRect();
                const x = e.clientX - box.left;
                const y = e.clientY - box.top;
                const centerX = box.width / 2;
                const centerY = box.height / 2;
                // Intensity of tilt
                const rotateX = (centerY - y) / 15; 
                const rotateY = (x - centerX) / 15;
                
                setTransform(`perspective(1000px) rotateX(${rotateX}deg) rotateY(${rotateY}deg) scale(1.05)`);
            };

            const handleMouseLeave = () => {
                setTransform("perspective(1000px) rotateX(0deg) rotateY(0deg) scale(1)");
            };

            return (
                <div 
                    className="transition-transform duration-200 ease-out transform-style-3d h-full"
                    onMouseMove={handleMouseMove}
                    onMouseLeave={handleMouseLeave}
                    style={{ transform }}
                >
                    {children}
                </div>
            );
        };

        const Navbar = ({ activePage, setActivePage, isScrolled }) => {

            return (
                <nav className={`fixed w-full z-50 transition-all duration-300 ${isScrolled ? 'bg-white/95 backdrop-blur-md shadow-lg py-2' : 'bg-transparent py-4'}`}>

                    <div className="flex justify-between items-center h-20">
                    <div 
                        className="flex-shrink-0 flex items-center cursor-pointer transition-transform hover:scale-105" 
                        onClick={() => setActivePage('home')}
                    >
                        <img 
                            src="MOV_LOGO.jpeg" 
                            alt="MOV Control Logo" 
                            className="h-16 w-auto object-contain drop-shadow-md"
                        />
                    </div>

                    <div className="hidden md:flex space-x-8 items-center">
                        {navLinks.map((link) => (
                        <button
                            key={link.id}
                            onClick={() => setActivePage(link.id)}
                            className={`text-sm font-bold uppercase tracking-wider transition-all duration-300 hover:text-blue-600 relative group ${
                            activePage === link.id ? 'text-blue-600' : (isScrolled || activePage !== 'home' ? 'text-slate-700' : 'text-white')
                            }`}
                        >
                            {link.name}
                            <span className={`absolute -bottom-1 left-0 w-0 h-0.5 bg-blue-600 transition-all duration-300 group-hover:w-full ${activePage === link.id ? 'w-full' : ''}`}></span>
                        </button>
                        ))}
                    </div>

                    <div className="md:hidden flex items-center">
                        <button 
                        onClick={() => setIsMobileMenuOpen(!isMobileMenuOpen)}
                        className={`p-2 transition-colors ${isScrolled || activePage !== 'home' ? 'text-slate-800' : 'text-white'}`}
                        >
                        {isMobileMenuOpen ? <X size={28} /> : <Menu size={28} />}
                        </button>
                    </div>
                    </div>
                </div>

                {isMobileMenuOpen && (
                    <div className="md:hidden bg-white shadow-xl border-t absolute w-full left-0 top-full animate-fade-in">
                    <div className="px-4 pt-2 pb-6 space-y-2">
                        {navLinks.map((link) => (
                        <button
                            key={link.id}
                            onClick={() => {
                            setActivePage(link.id);
                            setIsMobileMenuOpen(false);
                            }}
                            className={`block w-full text-left px-3 py-3 rounded-md text-base font-medium ${
                            activePage === link.id ? 'bg-blue-50 text-blue-600' : 'text-slate-600 hover:bg-slate-50'
                            }`}
                        >
                            {link.name}
                        </button>

                    </div>
                    
                    {/* Bottom Bar */}
                    <div className="border-t border-slate-800 pt-8 flex flex-col md:flex-row justify-between items-center text-sm text-slate-500">
                        <p className="text-center md:text-left mb-4 md:mb-0">&copy; 2026 MOVCNI . All rights reserved.</p>
                        <div className="flex space-x-6">
                            
                        </div>
                    </div>
                </div>
            </footer>
        );

        const App = () => {
            const [activePage, setActivePage] = useState('home');
            const [isScrolled, setIsScrolled] = useState(false);

            useEffect(() => {
                const handleScroll = () => {
                setIsScrolled(window.scrollY > 50);
                };
                window.addEventListener('scroll', handleScroll);
                return () => window.removeEventListener('scroll', handleScroll);
            }, []);

            useEffect(() => {
                window.scrollTo({ top: 0, behavior: 'smooth' });
            }, [activePage]);

            return (
                <div className="font-sans text-slate-900 bg-white min-h-screen flex flex-col relative overflow-x-hidden">
                <Navbar activePage={activePage} setActivePage={setActivePage} isScrolled={isScrolled} />
                
                {/* Overflow-hidden prevents gears from making the page wider, but they won't get vertically cut anymore */}
                <main className="flex-grow">
                    {activePage === 'home' && (
                    <>
                        <Hero setActivePage={setActivePage} />
                        <ClientTicker />
                        <ServicesSection />
                        <AboutSection />
                        <RecentSitesSection />
                        <ContactSection />
                    </>
                    )}
                    {activePage === 'services' && <div className="pt-20 animate-fade-in"><ServicesSection /></div>}
                    {activePage === 'about' && <div className="pt-20 animate-fade-in"><AboutSection /></div>}
                    {activePage === 'gallery' && <div className="pt-20 animate-fade-in"><FullGalleryPage /></div>}
                    {activePage === 'contact' && <div className="pt-20 animate-fade-in"><ContactSection /></div>}
                </main>
                <Footer setActivePage={setActivePage} />

                {/* --- WHATSAPP FLOATING BUTTON --- */}
                <a
                    href="https://wa.me/917223838222"
                    target="_blank"
                    rel="noopener noreferrer"
                    className="fixed bottom-8 right-8 z-[100] bg-[#25D366] text-white p-4 rounded-full shadow-[0_10px_20px_rgba(0,0,0,0.3)] wa-btn flex items-center justify-center hover:bg-[#128C7E] transition-all duration-300"
                    title="Chat with us on WhatsApp"
                >
                    <WhatsAppIcon size={36} />
                </a>
                
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
